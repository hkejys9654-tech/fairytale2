<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 동화 만들기</title>

<style>
body{
font-family: Arial;
padding:20px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
}

#result{
margin-top:20px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h2>AI 동화 만들기</h2>

<input id="name" placeholder="주인공 이름">

<input id="apikey" placeholder="OpenAI API Key">

<button onclick="makeStory()">동화 만들기</button>

<div id="result"></div>

</div>

<script>

async function makeStory(){

const name=document.getElementById("name").value
const key=document.getElementById("apikey").value
const result=document.getElementById("result")

if(!name || !key){
alert("이름과 API키를 입력하세요")
return
}

result.innerText="동화 만드는 중..."

try{

const response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"user",
content:name+" 이라는 아이가 주인공인 짧은 동화를 만들어줘"
}
]
})
})

const data=await response.json()

result.innerText=data.choices[0].message.content

}catch(e){

result.innerText="에러 발생: "+e

}

}

</script>

</body>
</html>
