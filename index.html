<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동화 모험: 나만의 이야기 만들기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC; 
            color: #1E293B; 
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }
        .font-space { font-family: 'Orbitron', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .glow-blue { box-shadow: 0 10px 30px rgba(56, 189, 248, 0.15); }
        .glow-orange { box-shadow: 0 10px 30px rgba(251, 146, 60, 0.15); }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10% 10%, #38BDF8, transparent),
                radial-gradient(1px 1px at 20% 50%, #A855F7, transparent),
                radial-gradient(2px 2px at 40% 80%, #38BDF8, transparent),
                radial-gradient(1px 1px at 60% 20%, #A855F7, transparent),
                radial-gradient(2px 2px at 80% 40%, #38BDF8, transparent),
                radial-gradient(1px 1px at 90% 90%, #A855F7, transparent);
            background-size: 300px 300px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F8FAFC; }
        ::-webkit-scrollbar-thumb { background: #38BDF8; border-radius: 10px; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        .choice-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .choice-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "@google/genai": "https://esm.run/@google/genai",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useRef, useEffect, useCallback, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenAI } from "@google/genai";
        import { 
            Rocket, Download, Play, Square, Loader2, 
            Zap, Volume2, Settings2, ChevronDown, Orbit, Heart, Shield, Ghost,
            Star, Trophy, Medal, PenTool, Save, RotateCcw, BookOpen, Key
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'framer-motion';

        function App() {
            const [name, setName] = useState('');
            const [storyParts, setStoryParts] = useState([]);
            const [currentChoices, setCurrentChoices] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isReading, setIsReading] = useState(false);
            const [voices, setVoices] = useState([]);
            const [selectedVoiceIndex, setSelectedVoiceIndex] = useState(0);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [readingProgress, setReadingProgress] = useState(0);
            const [missionCount, setMissionCount] = useState(0);
            const [diary, setDiary] = useState('');
            const [isFinished, setIsFinished] = useState(false);
            const [savedStories, setSavedStories] = useState([]);
            const [isArchiveOpen, setIsArchiveOpen] = useState(false);
            const [statusMessage, setStatusMessage] = useState('');
            
            // API Key State
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [inputKey, setInputKey] = useState(localStorage.getItem('gemini_api_key') || '');
            
            const audioRef = useRef(null);
            const scrollRef = useRef(null);

            const BGM_URL = "https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a73484.mp3";

            // Rank Logic
            useEffect(() => {
                const savedCount = parseInt(localStorage.getItem('space_hero_count') || '0');
                setMissionCount(savedCount);
                
                const savedHistory = JSON.parse(localStorage.getItem('space_hero_stories') || '[]');
                setSavedStories(savedHistory);
            }, []);

            const saveCurrentStory = () => {
                if (storyParts.length === 0) return;
                const newStory = {
                    id: Date.now(),
                    name: name,
                    parts: storyParts,
                    date: new Date().toLocaleString()
                };
                const updated = [newStory, ...savedStories].slice(0, 10);
                setSavedStories(updated);
                localStorage.setItem('space_hero_stories', JSON.stringify(updated));
            };

            const loadSavedStory = (saved) => {
                setName(saved.name);
                setStoryParts(saved.parts);
                setCurrentChoices([]);
                setIsFinished(true);
                setIsArchiveOpen(false);
                stopReading();
            };

            const finishStoryManually = () => {
                setIsFinished(true);
                setCurrentChoices([]);
                const newCount = missionCount + 1;
                setMissionCount(newCount);
                localStorage.setItem('space_hero_count', newCount.toString());
                saveCurrentStory();
            };

            const rankInfo = useMemo(() => {
                if (missionCount >= 6) return { label: '전설의 모험가', color: 'text-yellow-600', icon: Trophy };
                if (missionCount >= 3) return { label: '숙련된 탐험가', color: 'text-sky-600', icon: Medal };
                return { label: '초보 여행자', color: 'text-slate-600', icon: Star };
            }, [missionCount]);

            const RankIcon = rankInfo.icon;

            const loadVoices = useCallback(() => {
                let availableVoices = window.speechSynthesis.getVoices();
                if (availableVoices.length === 0) return;
                const filtered = availableVoices.filter(v => v.lang.includes('ko') || v.lang.includes('en'));
                setVoices(filtered.length > 0 ? filtered : availableVoices);
            }, []);

            useEffect(() => {
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
                const timer = setInterval(() => {
                    if (voices.length === 0) loadVoices();
                    else clearInterval(timer);
                }, 1000);
                return () => {
                    clearInterval(timer);
                    window.speechSynthesis.cancel();
                };
            }, [loadVoices, voices.length]);

            const saveApiKey = () => {
                localStorage.setItem('gemini_api_key', inputKey);
                setApiKey(inputKey);
                setIsSettingsOpen(false);
            };

            const generatePart = async (choice = null) => {
                const themes = [
                    '신비한 마법의 숲', 
                    '깊고 푸른 바닷속 왕국', 
                    '구름 위 둥둥 하늘나라', 
                    '장난감들이 살아나는 방', 
                    '달콤한 디저트 마을', 
                    '말하는 동물들의 숲속 학교', 
                    '반짝이는 별똥별 우주선', 
                    '신나는 공룡 시대'
                ];

                if (!apiKey) {
                    setStatusMessage("설정(톱니바퀴)에서 API 키를 먼저 입력해 주세요!");
                    setIsSettingsOpen(true);
                    return;
                }

                setIsLoading(true);
                setIsFinished(false);
                setStatusMessage('');
                
                try {
                    const genAI = new GoogleGenAI({ apiKey: apiKey });
                    const isFirst = storyParts.length === 0;
                    
                    let themeInstruction = "";
                    if (isFirst) {
                        const randomTheme = themes[Math.floor(Math.random() * themes.length)];
                        themeInstruction = `이번 이야기의 무작위 배경은 '${randomTheme}'입니다. 이 테마에 맞춰서 이야기를 시작하세요.`;
                    }

                    const currentPartNum = storyParts.length + 1;
                    const context = storyParts.map(p => p.text).join('\n');
                    
                    const prompt = `
                        당신은 5~10세 어린이를 위한 최고의 동화 작가입니다.
                        ${themeInstruction}
                        주인공 이름: ${name}
                        현재까지의 이야기: ${isFirst ? '시작 전' : context}
                        사용자의 선택: ${choice || '이야기 시작'}
                        현재 진행 상황: 총 5개 파트 중 ${currentPartNum}번째 파트입니다.

                        다음 규칙을 반드시 지켜주세요:
                        1. **언어 수준**: 5~10세 아이들이 이해하기 쉬운 아주 쉬운 단어와 짧은 문장을 사용하세요. 어려운 한자어나 복잡한 문장 구조는 피하고, 엄마가 머리맡에서 읽어주는 것처럼 다정하고 쉬운 말투로 작성하세요.
                        2. **나이 언급 금지**: 이야기 속에 "10살 소년", "몇 살인 누구"와 같이 주인공의 나이를 직접적으로 언급하는 문구는 절대 넣지 마세요.
                        3. **내용**: 판타지, 일상, 미스터리, 모험 등 아이들의 상상력을 자극하는 따뜻하고 재미있는 이야기를 이어가세요.
                        4. 뻔한 전개(예: 빛나는 돌을 줍거나 길을 잃는 등)를 피하고, 매번 새롭고 예측할 수 없는 독창적인 사건, 마법, 등장인물을 만들어주세요.
                        5. 이번 파트의 텍스트(약 300~400자 내외)를 작성하세요.
                        6. 만약 이번이 5번째 파트라면, 반드시 이야기를 감동적이고 재미있게 마무리하고 'FINISH'라고 작성하세요.
                        7. 5번째 파트가 아니라면, 이야기가 절정에 달했을 때 멈추고 다음에 이어질 두 가지 선택지를 제시하세요.
                        8. 이 장면을 묘사할 수 있는 짧은 영어 키워드 1개를 'IMAGE_KEYWORD: [영단어]' 형식으로 포함하세요.
                        9. 선택지는 'CHOICE1: [내용]', 'CHOICE2: [내용]' 형식으로 작성하세요.
                    `;

                    const result = await genAI.models.generateContent({
                        model: "gemini-3-flash-preview",
                        contents: prompt,
                        config: { temperature: 0.9, topK: 40 }
                    });

                    const responseText = result.text;
                    
                    // Parsing
                    const textMatch = responseText.split(/IMAGE_KEYWORD:|CHOICE1:|CHOICE2:|FINISH/i)[0].trim();
                    const keywordMatch = responseText.match(/IMAGE_KEYWORD:\s*\[?([^\]\n]+)\]?/i);
                    const c1Match = responseText.match(/CHOICE1:\s*\[?([^\]\n]+)\]?/i);
                    const c2Match = responseText.match(/CHOICE2:\s*\[?([^\]\n]+)\]?/i);
                    const finishMatch = responseText.toUpperCase().includes('FINISH') || currentPartNum >= 5;

                    const rawKeyword = keywordMatch ? keywordMatch[1].trim() : 'adventure';
                    const safeKeyword = rawKeyword.replace(/[^a-zA-Z0-9\s]/g, '').trim() || 'happy story';
                    const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(safeKeyword + ' kids storybook illustration cute digital art')}?width=800&height=400&nologo=true&seed=${Math.floor(Math.random() * 1000)}`;

                    const newPart = {
                        text: textMatch,
                        image: imageUrl,
                        id: Date.now()
                    };

                    setStoryParts(prev => [...prev, newPart]);
                    
                    if (finishMatch) {
                        setCurrentChoices([]);
                        setIsFinished(true);
                        const newCount = missionCount + 1;
                        setMissionCount(newCount);
                        localStorage.setItem('space_hero_count', newCount.toString());
                    } else {
                        setCurrentChoices([
                            c1Match ? c1Match[1].trim() : "계속 전진한다",
                            c2Match ? c2Match[1].trim() : "주변을 살핀다"
                        ]);
                    }

                    setTimeout(() => {
                        scrollRef.current?.scrollIntoView({ behavior: 'smooth' });
                        startReading(textMatch);
                    }, 500);

                } catch (error) {
                    console.error("Error:", error);
                    if (error.message?.includes('429') || error.message?.includes('quota')) {
                        setStatusMessage('현재 통신량이 많아 잠시 후 다시 시도해 주세요. (Quota Exceeded)');
                    } else if (error.message?.includes('API_KEY_INVALID') || error.message?.includes('invalid')) {
                        setStatusMessage('API 키가 올바르지 않습니다. 설정에서 다시 확인해 주세요.');
                    } else {
                        setStatusMessage('통신 중 오류가 발생했습니다. 다시 시도해 주세요.');
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const startReading = (text) => {
                window.speechSynthesis.cancel();
                const cleanText = text.replace(/\*/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                if (voices[selectedVoiceIndex]) utterance.voice = voices[selectedVoiceIndex];
                utterance.lang = voices[selectedVoiceIndex]?.lang || 'ko-KR';
                utterance.rate = 1.0;
                utterance.onstart = () => setIsReading(true);
                utterance.onend = () => setIsReading(false);
                utterance.onboundary = (e) => setReadingProgress((e.charIndex / text.length) * 100);
                window.speechSynthesis.speak(utterance);
            };

            const stopReading = () => {
                window.speechSynthesis.cancel();
                setIsReading(false);
            };

            const downloadLog = () => {
                const fullText = storyParts.map((p, i) => `[Part ${i+1}]\n${p.text}`).join('\n\n');
                const diaryText = diary ? `\n\n--- 나의 모험 일기 ---\n${diary}` : '';
                const blob = new Blob([`영웅 ${name}의 모험 일지\n\n${fullText}${diaryText}`], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${name}_모험_일지.txt`;
                a.click();
            };

            const resetGame = () => {
                setStoryParts([]);
                setCurrentChoices([]);
                setDiary('');
                setIsFinished(false);
                setName('');
                stopReading();
            };

            return React.createElement('div', { className: "min-h-screen flex flex-col items-center p-4 pb-20" },
                React.createElement('audio', { key: 'audio', ref: audioRef, src: BGM_URL, loop: true }),
                
                // Header
                React.createElement('header', { key: 'header', className: "w-full max-w-2xl pt-8 pb-6 flex flex-col items-center" },
                    React.createElement(motion.div, {
                        key: 'badge',
                        initial: { scale: 0 },
                        animate: { scale: 1 },
                        className: `flex items-center gap-2 px-4 py-1.5 rounded-full glass border-sky-500/30 mb-4 ${rankInfo.color}`
                    }, 
                        React.createElement(RankIcon, { key: 'badge-icon', size: 16 }),
                        React.createElement('span', { key: 'badge-label', className: "text-[10px] font-bold uppercase tracking-widest" }, rankInfo.label)
                    ),
                    React.createElement('h1', { key: 'h1', className: "text-3xl font-space font-bold tracking-widest text-slate-900 mb-2 uppercase text-center" }, "✨ AI 동화 모험 ✨"),
                    React.createElement('p', { key: 'p', className: "text-[10px] uppercase tracking-[0.4em] text-sky-600 font-bold mb-4" }, "나만의 특별한 이야기 속으로"),
                    React.createElement('button', {
                        key: 'archive-toggle',
                        onClick: () => setIsArchiveOpen(true),
                        className: "flex items-center gap-2 px-3 py-1 rounded-lg glass border-sky-500/20 text-[10px] font-bold text-sky-400 hover:bg-sky-500/10 transition-all"
                    }, React.createElement(BookOpen, { size: 12 }), "저장된 모험 목록")
                ),

                React.createElement('main', { key: 'main', className: "w-full max-w-2xl space-y-8" },
                    // Start Screen
                    storyParts.length === 0 && React.createElement(motion.section, {
                        key: 'start-screen',
                        initial: { opacity: 0, y: 20 },
                        animate: { opacity: 1, y: 0 },
                        className: "glass rounded-3xl p-8 glow-blue"
                    }, 
                        React.createElement('div', { className: "space-y-6" }, 
                            React.createElement('div', { key: 'name-input', className: "space-y-3" }, 
                                React.createElement('label', { className: "text-[10px] font-bold uppercase tracking-[0.2em] text-sky-600" }, "주인공 이름을 입력하세요"),
                                React.createElement('input', {
                                    type: "text",
                                    value: name,
                                    onChange: (e) => setName(e.target.value),
                                    placeholder: "이름을 적어주세요",
                                    className: "w-full px-4 py-4 text-xl font-space bg-white/50 border-b-2 border-sky-500/30 focus:border-sky-400 outline-none transition-all text-slate-900 placeholder:text-slate-300 rounded-t-lg"
                                })
                            ),
                            React.createElement('button', {
                                key: 'start-btn',
                                onClick: () => generatePart(),
                                disabled: isLoading || !name.trim(),
                                className: "w-full py-5 bg-sky-600 hover:bg-sky-500 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-[0.98] transition-all disabled:bg-slate-200 disabled:text-slate-400 flex items-center justify-center gap-3 uppercase tracking-widest font-space"
                            }, isLoading ? React.createElement(Loader2, { className: "animate-spin" }) : "모험 시작")
                        )
                    ),

                    // Story Parts
                    React.createElement(AnimatePresence, { key: 'story-parts-presence' }, 
                        storyParts.map((part, index) => React.createElement(motion.div, {
                            key: part.id,
                            initial: { opacity: 0, x: -20 },
                            animate: { opacity: 1, x: 0 },
                            className: "space-y-6"
                        }, 
                            React.createElement('div', { key: 'story-card', className: "glass rounded-[2.5rem] overflow-hidden border-sky-500/10" }, 
                                React.createElement('img', {
                                    key: 'story-img',
                                    src: part.image,
                                    alt: "Scene",
                                    referrerPolicy: "no-referrer",
                                    className: "w-full h-64 object-cover border-b border-sky-500/20"
                                }),
                                React.createElement('div', { key: 'story-body', className: "p-8 space-y-4" }, 
                                    React.createElement('div', { key: 'story-meta', className: "flex justify-between items-center" }, 
                                        React.createElement('span', { key: 'log-entry', className: "text-[10px] font-bold text-sky-600 uppercase tracking-widest" }, `이야기 #${index + 1}`),
                                        index === storyParts.length - 1 && React.createElement('button', {
                                            key: 'read-btn',
                                            onClick: isReading ? stopReading : () => startReading(part.text),
                                            className: "p-2 rounded-full bg-sky-500/10 text-sky-600"
                                        }, isReading ? React.createElement(Square, { size: 16, fill: "currentColor" }) : React.createElement(Volume2, { size: 16 }))
                                    ),
                                    React.createElement('p', { key: 'story-text', className: "text-lg leading-relaxed text-slate-700" }, part.text)
                                )
                            )
                        ))
                    ),

                    // Choices
                    !isFinished && storyParts.length > 0 && React.createElement('div', { 
                        key: 'choices-section',
                        className: "space-y-4"
                    },
                        React.createElement('div', { key: 'action-btns', className: "flex gap-2" },
                            React.createElement('button', {
                                onClick: saveCurrentStory,
                                className: "flex-1 py-3 glass border-sky-500/20 text-sky-400 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-sky-500/10 transition-all flex items-center justify-center gap-2"
                            }, React.createElement(Save, { size: 12 }), "스토리 저장"),
                            React.createElement('button', {
                                onClick: finishStoryManually,
                                className: "flex-1 py-3 glass border-orange-500/20 text-orange-400 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-orange-500/10 transition-all flex items-center justify-center gap-2"
                            }, React.createElement(Zap, { size: 12 }), "이야기 마무리 짓기")
                        ),
                        React.createElement('div', { 
                            key: 'choices-grid',
                            ref: scrollRef,
                            className: "grid grid-cols-1 md:grid-cols-2 gap-4" 
                        }, isLoading ? 
                            React.createElement('div', { key: 'loading-indicator', className: "col-span-full flex flex-col items-center py-8 text-sky-600 gap-4" }, 
                                React.createElement(Loader2, { key: 'loader', className: "animate-spin", size: 32 }),
                                React.createElement('span', { key: 'loading-text', className: "text-xs font-bold uppercase tracking-widest" }, "다음 이야기를 만드는 중...")
                            )
                         : statusMessage ?
                            React.createElement('div', { key: 'status-indicator', className: "col-span-full flex flex-col items-center py-8 text-orange-400 gap-4" }, 
                                React.createElement('span', { key: 'status-text', className: "text-xs font-bold uppercase tracking-widest text-center" }, statusMessage),
                                React.createElement('button', {
                                    onClick: () => generatePart(),
                                    className: "px-6 py-2 glass border-orange-500/30 text-orange-400 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-orange-500/10 transition-all"
                                }, "다시 시도")
                            )
                         : React.createElement(React.Fragment, { key: 'choices-list' }, currentChoices.map((choice, i) => React.createElement('button', {
                            key: `choice-${i}`,
                            onClick: () => generatePart(choice),
                            className: "choice-btn p-6 glass border-sky-500/30 rounded-2xl text-left text-sm font-medium hover:border-sky-400 transition-all text-sky-600 flex items-center gap-4"
                        },
